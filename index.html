
<!DOCTYPE html>
<html>
<head>
<title>Mini CRM - Lead Management</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input, select{
padding:10px;
margin:10px 0;
width:100%;
}

button{
padding:10px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th, td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#333;
color:white;
}

</style>

</head>

<body>

<h1>Client Lead Management System</h1>

<div class="container">

<h3>Add New Lead</h3>

<input type="text" id="name" placeholder="Client Name">

<input type="email" id="email" placeholder="Email">

<input type="text" id="company" placeholder="Company">

<select id="status">
<option>New</option>
<option>Contacted</option>
<option>Converted</option>
</select>

<button onclick="addLead()">Add Lead</button>

<h3>Lead List</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Company</th>
<th>Status</th>
</tr>
</thead>

<tbody id="leadTable">

</tbody>

</table>

</div>

<script>

let leads = [];

function addLead(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let company = document.getElementById("company").value;
let status = document.getElementById("status").value;

if(name=="" || email==""){
alert("Please fill all fields");
return;
}

let lead = {
name:name,
email:email,
company:company,
status:status
};

leads.push(lead);

displayLeads();

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("company").value="";

}

function displayLeads(){

let table = document.getElementById("leadTable");

table.innerHTML="";

for(let i=0;i<leads.length;i++){

table.innerHTML += `
<tr>
<td>${leads[i].name}</td>
<td>${leads[i].email}</td>
<td>${leads[i].company}</td>
<td>${leads[i].status}</td>
</tr>
`;

}

}

</script>

</body>
</html>
